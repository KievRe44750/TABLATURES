<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Tablatures | Bibliothèque Interactive</title>
    <style>
        :root {
            --primary-color: #3498db;
            --star-color: #f1c40f;
            --bg-color: #f4f7f6;
            --text-dark: #2c3e50;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            padding: 20px; 
            color: #333; 
        }

        .container { 
            max-width: 900px; 
            margin: auto; 
            background: white; 
            padding: 30px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        header { 
            border-bottom: 3px solid var(--primary-color); 
            margin-bottom: 25px; 
            padding-bottom: 10px; 
        }

        h1 { margin: 0; font-size: 1.8em; color: var(--text-dark); }

        /* Barre de recherche */
        .search-container { margin-bottom: 30px; }
        #searchBar {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.1em;
            border: 2px solid #eee;
            border-radius: 30px;
            outline: none;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        #searchBar:focus { border-color: var(--primary-color); }

        /* Liste des tablatures */
        #tabList { display: flex; flex-direction: column; gap: 15px; }
        
        .tab-item { 
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: center;
            padding: 18px;
            border: 1px solid #eee;
            border-radius: 12px;
            transition: all 0.3s ease;
            background: #fff;
        }

        .tab-item:hover { 
            background-color: #eef7fe; /* Bleu clair au survol */
            border-color: var(--primary-color);
            transform: translateX(8px);
        }

        .info h3 { margin: 0; color: var(--text-dark); font-size: 1.2em; text-transform: capitalize; }
        .info span { font-size: 0.85em; color: #7f8c8d; }

        /* Notation étoilée */
        .rating { margin-right: 25px; display: flex; flex-direction: row-reverse; }
        .star { font-size: 1.6em; color: #ddd; cursor: pointer; transition: color 0.2s; }
        .star:hover, .star:hover ~ .star { color: var(--star-color); }
        .active-star { color: var(--star-color) !important; }

        /* Bouton Ouvrir */
        .btn-view {
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
            text-decoration: none;
            text-align: center;
            min-width: 80px;
            transition: background 0.2s;
        }
        .btn-view:hover { background: #2980b9; }

        #noMatch { display: none; text-align: center; padding: 20px; color: #999; }
        .loader { text-align: center; padding: 20px; font-style: italic; color: var(--primary-color); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎸 Mes Tablatures Perso</h1>
    </header>

    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Rechercher un morceau ou un artiste..." onkeyup="filterTabs()">
    </div>

    <div id="noMatch">Aucun morceau trouvé...</div>
    <div id="tabList" class="loader">Chargement de votre bibliothèque...</div>
</div>

<script>
    // --- CONFIGURATION GITHUB (À REMPLIR) ---
    const repoOwner = 'KievRe44750'; 
    const repoName = 'TABLATURES';    
    const folderPath = 'pdfs'; 
    // ----------------------------------------

    async function loadFiles() {
        const url = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`;
        
        try {
            const response = await fetch(url);
            const files = await response.json();
            const tabList = document.getElementById('tabList');
            tabList.innerHTML = '';
            tabList.classList.remove('loader');

            if (!Array.isArray(files)) {
                tabList.innerHTML = "Erreur : Dossier 'pdfs' introuvable sur GitHub.";
                return;
            }

            files.forEach(file => {
                if (file.name.toLowerCase().endsWith('.pdf')) {
                    // Nettoyage du nom pour l'affichage
                    const displayName = file.name.replace('.pdf', '').replace(/-/g, ' ').replace(/_/g, ' ');
                    
                    const item = document.createElement('div');
                    item.className = 'tab-item';
                    item.setAttribute('data-title', displayName.toLowerCase());
                    
                    item.innerHTML = `
                        <div class="info">
                            <h3>${displayName}</h3>
                            <span>Fichier : ${file.name}</span>
                        </div>
                        <div class="rating">
                            <span class="star" onclick="setRating(this, 5)">★</span>
                            <span class="star" onclick="setRating(this, 4)">★</span>
                            <span class="star" onclick="setRating(this, 3)">★</span>
                            <span class="star" onclick="setRating(this, 2)">★</span>
                            <span class="star" onclick="setRating(this, 1)">★</span>
                        </div>
                        <a href="https://${repoOwner}.github.io/${repoName}/${file.path}" target="_blank" class="btn-view">Ouvrir</a>
                    `;
                    tabList.appendChild(item);
                }
            });
        } catch (error) {
            console.error(error);
            document.getElementById('tabList').innerHTML = "Erreur de connexion avec GitHub.";
        }
    }

    function setRating(element, rating) {
        const parent = element.parentElement;
        const stars = Array.from(parent.querySelectorAll('.star')).reverse();
        stars.forEach(s => s.classList.remove('active-star'));
        for(let i=0; i < rating; i++) {
            stars[i].classList.add('active-star');
        }
    }

    function filterTabs() {
        const input = document.getElementById('searchBar').value.toLowerCase();
        const items = document.getElementsByClassName('tab-item');
        const noMatch = document.getElementById('noMatch');
        let hasResults = false;

        for (let item of items) {
            const title = item.getAttribute('data-title');
            if (title.includes(input)) {
                item.style.display = "grid";
                hasResults = true;
            } else {
                item.style.display = "none";
            }
        }
        noMatch.style.display = hasResults ? "none" : "block";
    }

    // Lancement automatique
    loadFiles();
</script>

</body>
</html>

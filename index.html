<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Tablatures | Pro Mobile</title>
    <style>
        :root {
            --primary-color: #3498db;
            --star-color: #f1c40f;
            --bg-color: #f4f7f6;
            --text-dark: #2c3e50;
            --new-color: #e67e22;
        }

        /* Reset & Base */
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background-color: var(--bg-color); 
            padding: 10px; /* Moins de padding sur mobile */
            margin: 0;
            color: #333; 
        }

        .container { 
            max-width: 600px; 
            margin: auto; 
            background: white; 
            padding: 15px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }

        header { 
            border-bottom: 3px solid var(--primary-color); 
            margin-bottom: 20px; 
            padding-bottom: 10px; 
            display: flex; 
            flex-direction: column; /* Titre et compteur l'un sur l'autre sur mobile */
            align-items: flex-start;
        }

        h1 { margin: 0; font-size: 1.5em; color: var(--text-dark); }
        #fileCount { font-weight: bold; color: var(--primary-color); font-size: 0.85em; margin-top: 5px; }

        .search-container { margin-bottom: 20px; }
        #searchBar { 
            width: 100%; 
            padding: 12px 20px; 
            font-size: 16px; /* 16px minimum pour éviter le zoom auto sur iPhone */
            border: 2px solid #eee; 
            border-radius: 30px; 
            outline: none; 
            box-sizing: border-box; 
        }

        /* LISTE : Passage en Flexbox verticale pour le mobile */
        #tabList { display: flex; flex-direction: column; gap: 12px; }

        .tab-item { 
            display: flex;
            flex-direction: column; /* Empilement vertical des éléments */
            gap: 12px;
            padding: 15px; 
            border: 1px solid #eee; 
            border-radius: 12px; 
            background: #fff; 
            transition: 0.2s;
        }

        .tab-item:active { background-color: #eef7fe; transform: scale(0.98); }

        .info h3 { 
            margin: 0; 
            color: var(--text-dark); 
            font-size: 1.1em; 
            text-transform: capitalize; 
            display: flex; 
            flex-wrap: wrap; 
            align-items: center; 
            gap: 8px; 
        }

        .info span { font-size: 0.8em; color: #7f8c8d; display: block; margin-top: 4px; }

        .badge-new { 
            background: var(--new-color); 
            color: white; 
            font-size: 0.7em; 
            padding: 2px 8px; 
            border-radius: 4px; 
            text-transform: uppercase; 
        }

        /* Barre d'action : Note à gauche, bouton à droite */
        .actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid #f9f9f9;
            padding-top: 10px;
        }

        .rating { display: flex; flex-direction: row-reverse; gap: 2px; }
        .star { 
            font-size: 1.8em; /* Plus gros pour faciliter le clic au doigt */
            color: #ddd; 
            cursor: pointer; 
            padding: 0 2px;
        }
        .active-star { color: var(--star-color) !important; }

        .btn-view { 
            background: var(--primary-color); 
            color: white; 
            padding: 10px 18px; 
            border-radius: 8px; 
            font-weight: bold; 
            text-decoration: none; 
            font-size: 0.9em;
            text-align: center;
        }

        #noMatch { display: none; text-align: center; color: #999; padding: 20px; }
        .loader { text-align: center; color: var(--primary-color); padding: 20px; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🎸 Mes Tablatures</h1>
        <div id="fileCount">Chargement...</div>
    </header>

    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Rechercher un morceau..." onkeyup="filterTabs()">
    </div>

    <div id="noMatch">Aucun morceau trouvé...</div>
    <div id="tabList" class="loader">Initialisation de la bibliothèque...</div>
</div>

<script>
    // --- CONFIGURATION ---
    const repoOwner = 'KievRe44750'; 
    const repoName = 'TABLATURES';    
    const folderPath = 'pdfs'; 
    // ---------------------

    async function loadFiles() {
        const url = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`;
        
        try {
            const response = await fetch(url);
            const files = await response.json();
            const tabList = document.getElementById('tabList');
            tabList.innerHTML = '';
            tabList.classList.remove('loader');

            if (!Array.isArray(files)) {
                tabList.innerHTML = "Erreur : dossier introuvable.";
                return;
            }

            const pdfFiles = files.filter(f => f.name.toLowerCase().endsWith('.pdf'));
            document.getElementById('fileCount').innerText = `${pdfFiles.length} morceaux disponibles`;

            pdfFiles.forEach(file => {
                const displayName = file.name.replace('.pdf', '').replace(/-/g, ' ').replace(/_/g, ' ');
                const isNew = file.name.toUpperCase().includes('NEW');
                const savedRating = localStorage.getItem('rating-' + file.sha) || 0;

                const item = document.createElement('div');
                item.className = 'tab-item';
                item.setAttribute('data-title', displayName.toLowerCase());
                
                item.innerHTML = `
                    <div class="info">
                        <h3>${displayName} ${isNew ? '<span class="badge-new">New</span>' : ''}</h3>
                        <span>${file.name}</span>
                    </div>
                    <div class="actions">
                        <div class="rating" data-sha="${file.sha}">
                            ${[5,4,3,2,1].map(num => `
                                <span class="star ${num <= savedRating ? 'active-star' : ''}" 
                                      onclick="setRating(this, ${num})">★</span>
                            `).join('')}
                        </div>
                        <a href="https://${repoOwner}.github.io/${repoName}/${file.path}" target="_blank" class="btn-view">Ouvrir</a>
                    </div>
                `;
                tabList.appendChild(item);
            });
        } catch (error) {
            document.getElementById('tabList').innerHTML = "Erreur de connexion.";
        }
    }

    function setRating(element, rating) {
        const parent = element.parentElement;
        const sha = parent.dataset.sha;
        const stars = Array.from(parent.querySelectorAll('.star')).reverse();
        
        stars.forEach(s => s.classList.remove('active-star'));
        for(let i=0; i < rating; i++) stars[i].classList.add('active-star');
        
        localStorage.setItem('rating-' + sha, rating);
    }

    function filterTabs() {
        const input = document.getElementById('searchBar').value.toLowerCase();
        const items = document.getElementsByClassName('tab-item');
        let hasResults = false;
        for (let item of items) {
            const show = item.getAttribute('data-title').includes(input);
            item.style.display = show ? "flex" : "none";
            if(show) hasResults = true;
        }
        document.getElementById('noMatch').style.display = hasResults ? "none" : "block";
    }

    loadFiles();
</script>

</body>
</html>

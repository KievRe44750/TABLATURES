<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Tablatures Personnelles</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
        
        .file-list { list-style: none; padding: 0; margin-top: 20px; }
        .file-item { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            border: 1px solid #eee;
            border-radius: 8px;
            transition: background 0.3s, transform 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }
        
        /* Effet visuel lors du survol (similaire à vos formulaires d'audit) */
        .file-item:hover { 
            background-color: #e3f2fd; 
            transform: translateX(5px);
            border-color: #3498db;
        }

        .file-info { display: flex; align-items: center; }
        .pdf-icon { font-size: 24px; margin-right: 15px; color: #e74c3c; }
        .btn-open { background: #3498db; color: white; padding: 8px 15px; border-radius: 5px; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎸 Mes Tablatures</h1>
    <p>Cliquez sur un titre pour ouvrir le PDF directement dans votre navigateur.</p>

    <div class="file-list">
        <a href="pdfs/ma-super-tablature.pdf" target="_blank" class="file-item">
            <div class="file-info">
                <span class="pdf-icon">📄</span>
                <div>
                    <strong>Morceau : Stairway to Heaven</strong><br>
                    <small>Ajouté le : 27/02/2026</small>
                </div>
            </div>
            <span class="btn-open">Ouvrir</span>
        </a>

        </div>
</div>

</body>
</html>

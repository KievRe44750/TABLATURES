<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Tablatures | Portfolio</title>
    <style>
        :root {
            --primary-color: #3498db;
            --star-color: #f1c40f;
            --bg-color: #f8f9fa;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        
        h1 { border-bottom: 3px solid var(--primary-color); padding-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        
        .tab-list { margin-top: 30px; }
        
        /* Style des lignes de tablatures */
        .tab-item { 
            display: grid;
            grid-template-columns: 1fr auto auto;
            align-items: center;
            padding: 20px;
            margin-bottom: 15px;
            border: 1px solid #eee;
            border-radius: 10px;
            transition: all 0.3s ease;
            text-decoration: none;
            color: inherit;
        }

        .tab-item:hover { 
            background-color: #e3f2fd; /* Bleu clair au survol comme vos formulaires */
            border-color: var(--primary-color);
            transform: translateY(-2px);
        }

        .info h3 { margin: 0; color: #2c3e50; }
        .info span { font-size: 0.85em; color: #7f8c8d; }

        /* Système de notation étoilé */
        .rating {
            margin-right: 20px;
            display: flex;
            flex-direction: row-reverse; /* Pour la logique de sélection inverse en CSS */
            gap: 2px;
        }

        .star {
            font-size: 1.5em;
            color: #ddd;
            cursor: pointer;
            transition: color 0.2s;
        }

        /* Effet au survol et sélection */
        .star:hover, .star:hover ~ .star { color: var(--star-color); }
        .active-star { color: var(--star-color) !important; }

        .btn-view {
            background: var(--primary-color);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎸 Ma Bibliothèque de Tablatures</h1>
    <p>Sélectionnez un morceau pour voir le PDF et notez sa difficulté ou votre maîtrise :</p>

    <div class="tab-list">
        
        <div class="tab-item">
            <div class="info">
                <h3>Stairway to Heaven - Led Zeppelin</h3>
                <span>Fichier : stairway_heaven.pdf</span>
            </div>
            
            <div class="rating" data-id="tab1">
                <span class="star" onclick="setRating(this, 5)">★</span>
                <span class="star" onclick="setRating(this, 4)">★</span>
                <span class="star" onclick="setRating(this, 3)">★</span>
                <span class="star" onclick="setRating(this, 2)">★</span>
                <span class="star" onclick="setRating(this, 1)">★</span>
            </div>

            <a href="pdfs/stairway_heaven.pdf" target="_blank" class="btn-view">Ouvrir PDF</a>
        </div>

        <div class="tab-item">
            <div class="info">
                <h3>Nothing Else Matters - Metallica</h3>
                <span>Fichier : metallica_nothing.pdf</span>
            </div>
            
            <div class="rating" data-id="tab2">
                <span class="star" onclick="setRating(this, 5)">★</span>
                <span class="star" onclick="setRating(this, 4)">★</span>
                <span class="star" onclick="setRating(this, 3)">★</span>
                <span class="star" onclick="setRating(this, 2)">★</span>
                <span class="star" onclick="setRating(this, 1)">★</span>
            </div>

            <a href="pdfs/metallica_nothing.pdf" target="_blank" class="btn-view">Ouvrir PDF</a>
        </div>

    </div>
</div>

<script>
    function setRating(element, rating) {
        const parent = element.parentElement;
        const stars = parent.querySelectorAll('.star');
        
        // On retire la classe active de toutes les étoiles du bloc
        stars.forEach(s => s.classList.remove('active-star'));
        
        // On ajoute la classe active à l'étoile cliquée et à toutes celles qui précèdent (visuellement à gauche)
        // Note : comme on utilise flex-direction: row-reverse, la logique est inversée
        const starsArray = Array.from(stars).reverse();
        for(let i=0; i < rating; i++) {
            starsArray[i].classList.add('active-star');
        }
        
        console.log("Note enregistrée pour " + parent.dataset.id + " : " + rating + "/5");
    }
</script>

</body>
</html>

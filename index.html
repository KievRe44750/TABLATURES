<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Tablatures - Bibliotèque intéractive </title>
    <style>
        :root {
            --primary-color: #3498db;
            --star-color: #f1c40f;
            --bg-color: #f4f7f6;
            --text-dark: #2c3e50;
            --new-color: #e67e22;
        }

        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); padding: 20px; color: #333; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        header { border-bottom: 3px solid var(--primary-color); margin-bottom: 25px; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-end; }
        h1 { margin: 0; font-size: 1.8em; color: var(--text-dark); }
        #fileCount { font-weight: bold; color: var(--primary-color); font-size: 0.9em; }

        .search-container { margin-bottom: 30px; }
        #searchBar { width: 100%; padding: 15px 20px; font-size: 1.1em; border: 2px solid #eee; border-radius: 30px; outline: none; box-sizing: border-box; }

        .tab-item { 
            display: grid; grid-template-columns: 1fr auto auto; align-items: center;
            padding: 18px; border: 1px solid #eee; border-radius: 12px; margin-bottom: 15px; background: #fff; transition: 0.3s;
        }
        .tab-item:hover { background-color: #eef7fe; border-color: var(--primary-color); transform: translateX(8px); }

        .info h3 { margin: 0; color: var(--text-dark); font-size: 1.2em; text-transform: capitalize; display: flex; align-items: center; gap: 10px; }
        .badge-new { background: var(--new-color); color: white; font-size: 0.6em; padding: 3px 8px; border-radius: 5px; text-transform: uppercase; }

        .rating { margin-right: 25px; display: flex; flex-direction: row-reverse; }
        .star { font-size: 1.6em; color: #ddd; cursor: pointer; }
        .star:hover, .star:hover ~ .star, .active-star { color: var(--star-color); }

        .btn-view { background: var(--primary-color); color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; text-decoration: none; }
        
        #noMatch { display: none; text-align: center; color: #999; }
        .loader { text-align: center; color: var(--primary-color); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h1>🎸 Mes Tablatures</h1>
            <div id="fileCount">Chargement du compteur...</div>
        </div>
    </header>

    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Rechercher un morceau..." onkeyup="filterTabs()">
    </div>

    <div id="noMatch">Aucun morceau trouvé...</div>
    <div id="tabList" class="loader">Initialisation de la bibliothèque...</div>
</div>

<script>
    // --- CONFIGURATION ---
    const repoOwner = 'KievRe44750'; 
    const repoName = 'TABLATURES';    
    const folderPath = 'pdfs'; 
    // ---------------------

    async function loadFiles() {
        const url = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`;
        
        try {
            const response = await fetch(url);
            const files = await response.json();
            const tabList = document.getElementById('tabList');
            tabList.innerHTML = '';
            tabList.classList.remove('loader');

            if (!Array.isArray(files)) return;

            // Option 5 : Mise à jour du compteur
            const pdfFiles = files.filter(f => f.name.toLowerCase().endsWith('.pdf'));
            document.getElementById('fileCount').innerText = `${pdfFiles.length} morceaux disponibles`;

            // On trie les fichiers (les plus récents en premier si possible, ou par nom)
            pdfFiles.forEach(file => {
                const displayName = file.name.replace('.pdf', '').replace(/-/g, ' ').replace(/_/g, ' ');
                
                // Option 6 : Détection de nouveauté (Simulée ici, car l'API content ne donne pas la date exacte sans appel extra)
                // Pour l'exemple, on peut considérer un fichier "nouveau" s'il contient "NEW" dans le nom ou via un tag
                const isNew = false; // On pourrait l'automatiser avec un autre appel API si besoin

                const item = document.createElement('div');
                item.className = 'tab-item';
                item.setAttribute('data-title', displayName.toLowerCase());
                
                // Option 7 : Récupération de la note sauvegardée
                const savedRating = localStorage.getItem('rating-' + file.sha) || 0;

                item.innerHTML = `
                    <div class="info">
                        <h3>${displayName} ${isNew ? '<span class="badge-new">Nouveau</span>' : ''}</h3>
                        <span>Fichier : ${file.name}</span>
                    </div>
                    <div class="rating" data-sha="${file.sha}">
                        ${[5,4,3,2,1].map(num => `
                            <span class="star ${num <= savedRating ? 'active-star' : ''}" 
                                  onclick="setRating(this, ${num})">★</span>
                        `).join('')}
                    </div>
                    <a href="https://${repoOwner}.github.io/${repoName}/${file.path}" target="_blank" class="btn-view">Ouvrir</a>
                `;
                tabList.appendChild(item);
            });
        } catch (error) {
            document.getElementById('tabList').innerHTML = "Erreur GitHub.";
        }
    }

    // Option 7 : Sauvegarde locale de la note
    function setRating(element, rating) {
        const parent = element.parentElement;
        const sha = parent.dataset.sha;
        const stars = Array.from(parent.querySelectorAll('.star')).reverse();
        
        stars.forEach(s => s.classList.remove('active-star'));
        for(let i=0; i < rating; i++) stars[i].classList.add('active-star');
        
        localStorage.setItem('rating-' + sha, rating);
    }

    function filterTabs() {
        const input = document.getElementById('searchBar').value.toLowerCase();
        const items = document.getElementsByClassName('tab-item');
        let hasResults = false;
        for (let item of items) {
            const show = item.getAttribute('data-title').includes(input);
            item.style.display = show ? "grid" : "none";
            if(show) hasResults = true;
        }
        document.getElementById('noMatch').style.display = hasResults ? "none" : "block";
    }

    loadFiles();
</script>

</body>
</html>

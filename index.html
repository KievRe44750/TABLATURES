<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes Tablatures Automatiques</title>
    <style>
        :root { --primary: #3498db; --star: #f1c40f; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { border-bottom: 3px solid var(--primary); padding-bottom: 10px; }
        .search-container { margin: 20px 0; }
        #searchBar { width: 100%; padding: 12px; border-radius: 25px; border: 1px solid #ddd; outline: none; }
        
        /* Style des items générés */
        .tab-item { 
            display: grid; grid-template-columns: 1fr auto auto; align-items: center;
            padding: 15px; border: 1px solid #eee; border-radius: 10px; margin-bottom: 10px;
        }
        .info h3 { margin: 0; font-size: 1.1em; color: #2c3e50; }
        .rating { margin-right: 20px; display: flex; flex-direction: row-reverse; }
        .star { font-size: 1.4em; color: #ddd; cursor: pointer; }
        .star:hover, .star:hover ~ .star, .active-star { color: var(--star); }
        .btn-view { background: var(--primary); color: white; padding: 8px 15px; border-radius: 5px; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎸 Mes Tablatures (Auto)</h1>
    
    <div class="search-container">
        <input type="text" id="searchBar" placeholder="Rechercher un fichier..." onkeyup="filterTabs()">
    </div>

    <div id="tabList">Chargement des tablatures...</div>
</div>

<script>
    // --- CONFIGURATION À MODIFIER ---
    const repoOwner = 'KievRe44750'; // Remplacez par votre pseudo
    const repoName = 'TABLATURES';    // Remplacez par le nom du dépôt
    const folderPath = 'pdfs';               // Le nom du dossier contenant les PDF
    // --------------------------------

    async function loadFiles() {
        const url = `https://api.github.com/repos/${repoOwner}/${repoName}/contents/${folderPath}`;
        
        try {
            const response = await fetch(url);
            const files = await response.json();
            const tabList = document.getElementById('tabList');
            tabList.innerHTML = ''; // On vide le message de chargement

            files.forEach(file => {
                if (file.name.endsWith('.pdf')) {
                    // On nettoie le nom du fichier pour l'affichage (enlève .pdf et remplace les tirets)
                    const displayName = file.name.replace('.pdf', '').replace(/-/g, ' ').replace(/_/g, ' ');
                    
                    const item = document.createElement('div');
                    item.className = 'tab-item';
                    item.setAttribute('data-title', displayName.toLowerCase());
                    
                    item.innerHTML = `
                        <div class="info">
                            <h3>${displayName}</h3>
                            <span>Fichier: ${file.name}</span>
                        </div>
                        <div class="rating">
                            <span class="star" onclick="setRating(this, 5)">★</span>
                            <span class="star" onclick="setRating(this, 4)">★</span>
                            <span class="star" onclick="setRating(this, 3)">★</span>
                            <span class="star" onclick="setRating(this, 2)">★</span>
                            <span class="star" onclick="setRating(this, 1)">★</span>
                        </div>
                        <a href="${file.download_url}" target="_blank" class="btn-view">Ouvrir</a>
                    `;
                    tabList.appendChild(item);
                }
            });
        } catch (error) {
            console.error("Erreur lors de la récupération des fichiers:", error);
            document.getElementById('tabList').innerHTML = "Erreur de chargement. Vérifiez la configuration.";
        }
    }

    function setRating(element, rating) {
        const stars = Array.from(element.parentElement.querySelectorAll('.star')).reverse();
        stars.forEach(s => s.classList.remove('active-star'));
        for(let i=0; i < rating; i++) stars[i].classList.add('active-star');
    }

    function filterTabs() {
        const input = document.getElementById('searchBar').value.toLowerCase();
        const items = document.getElementsByClassName('tab-item');
        for (let item of items) {
            item.style.display = item.getAttribute('data-title').includes(input) ? "grid" : "none";
        }
    }

    // Lancer le chargement au démarrage
    loadFiles();
</script>

</body>
</html>
